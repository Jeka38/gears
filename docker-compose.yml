# Раздел, в котором описываются все сервисы (контейнеры) проекта
services:

  # ───────────────────────────────────────────────
  # Сервис 1: XMPP-бот на Python, который принимает файлы
  # ───────────────────────────────────────────────
  xmpp-bot:
    # Указываем, что образ нужно собрать из текущей директории (там должен быть Dockerfile)
    build: .

    # Фиксированное имя контейнера (удобно для docker ps, docker logs и т.д.)
    container_name: xmpp-file-bot

    # Политика перезапуска: контейнер будет автоматически перезапускаться при падении
    # и после перезагрузки хоста (кроме явной остановки через docker stop)
    restart: always

    # Загружаем переменные окружения из файла .env в корне проекта
    # (XMPP_JID, XMPP_PASSWORD, DOWNLOAD_DIR и т.д.)
    env_file: .env

    # Монтируем локальную папку ./downloads в /app/downloads внутри контейнера
    # Именно сюда бот будет сохранять полученные файлы
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data

    # Настройки логирования контейнера
    logging:
      # Используем стандартный json-драйвер (удобно для парсинга логов)
      driver: "json-file"
      # Ограничиваем размер одного файла логов до 10 МБ
      options:
        max-size: "10m"
        # Можно добавить max-file: "3" если хочется ротацию (по умолчанию 5)


  # ───────────────────────────────────────────────
  # Сервис 2: Nginx — отдаёт скачанные файлы через HTTPS
  # ───────────────────────────────────────────────
  nginx:
    # Используем официальный легковесный образ nginx на базе Alpine
    image: nginx:alpine

    # Фиксированное имя контейнера
    container_name: xmpp-nginx

    # Автоматический перезапуск при сбоях и после ребута сервера
    restart: always

    # Пробрасываем порт 443 хоста → порт 443 контейнера
    # (стандартный HTTPS-порт; 80 здесь не открываем → только HTTPS)
    ports:
      - "443:443"

    # Монтируемые тома:
    volumes:
      # Папка с файлами от бота — только для чтения (ro = read-only)
      - ./downloads:/app/downloads:ro

      # Папка с SSL-сертификатами (обычно fullchain.pem + privkey.pem от Let's Encrypt)
      - ./cert:/app/cert:ro

      # Готовый конфиг nginx (заменяет дефолтный)
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    # Nginx должен стартовать только после успешного запуска бота
    # (чтобы не было ситуаций, когда веб-сервер уже работает, а файлов ещё нет)
    depends_on:
      - xmpp-bot
