server {
    listen 443 ssl;
    server_name ${NGINX_SERVER_NAME};

    ssl_certificate /app/cert/fullchain.pem;
    ssl_certificate_key /app/cert/key.pem;

    # Оптимизация для передачи больших файлов
    client_max_body_size 0;
    sendfile on;
    tcp_nopush on;

    root /app/downloads;

    # 1. Запрещаем просмотр корня (списка папок всех пользователей)
    location = / {
        autoindex off;
        return 403;
    }

    # 2. Разрешаем просмотр внутри папок пользователей
    # Регулярное выражение ОБЯЗАТЕЛЬНО в кавычках из-за фигурных скобок {32}
    location ~ "^/([a-f0-9]{32})/(.*)$" {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Cache-Control' 'no-cache, no-store, must-revalidate' always;

        include /etc/nginx/mime.types;
    }

    # 3. Перенаправление со ссылки без слеша на ссылку со слешем (для работы autoindex)
    # Например: /hash -> /hash/
    location ~ "^/([a-f0-9]{32})$" {
        return 301 $scheme://$http_host$request_uri/;
    }

    # Защита от доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
}
